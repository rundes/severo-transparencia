  - _id: spc_50cd9a71348c4aafa2bbb791dfe9b718
    parentId: wrk_cfbdc0b84d9e44da87c5f20f41e54d49
    modified: 1686592096374
    created: 1679503787492
    fileName: API Publicación de Resultados Electorales
    contents: >-
      ---

      openapi: 3.0.3

      info:
        title: API de Publicación de Resultados Electorales
        description: API de Publicación de Resultados Electorales de Elecciones Nacionales, desde 2011. Para su uso puede requerirse autenticación mediante Bearer Token.
        termsOfService: https://resultados.mininterior.gob.ar/tos.html
        contact:
          email: soportedine@mininterior.gob.ar
        license:
          name: Apache 2.0
          url: http://www.apache.org/licenses/LICENSE-2.0.html
        version: 1.0.0
      externalDocs:
        description: Más información acerca de esta API
        url: https://resultados.mininterior.gob.ar/api-publicacion-resultados-electorales.html
      servers:

      - url: https://resultados.mininterior.gob.ar/api

      tags:

      - name: resultados
        description: Valores Electorales Totalizados
      paths:
        /resultados/getResultados:
          get:
            tags:
            - resultados
            summary: Devuelve los resultados para el Id de la categoria solicitada.
            description: Devuelve los resultados para el Id de la categoría electoral solicitada. Para solicitar un ámbito en concreto será necesario enviar también los Id de los padres del ámbito. Por ejemplo para solicitar una sección, sera necesario enviar el Id de distrito. El Id de la mesa, sera el código único de la mesa (distrito + sección + número mesa).
            operationId: getResultados
            parameters:
            - name: anioEleccion
              in: query
              description: Año del Ciclo Electoral 
              required: false
              style: form
              explode: true
              example: "2019"
              schema:
                type: string
                format: year
            - name: tipoRecuento
              in: query
              description: Tipo de recuento que se quiere consultar. Utilizar el valor "1" para Recuento Provisional.
              required: false
              style: form
              explode: true
              example: "1"
              schema:
                type: string
            - name: tipoEleccion
              in: query
              description: Tipo de elección a consultar. Utilizar el valor "1" para PASO, "2" para Elecciones Generales y "3" para Segunda Vuelta.
              required: false
              style: form
              explode: true
              example: "1"
              schema:
                type: string
            - name: categoriaId
              in: query
              description: Id de la categoría electoral para la cual se están solicitando datos.
              required: true
              style: form
              explode: true
              example: 2
              schema:
                type: integer
                format: int32
            - name: distritoId
              in: query
              description: Id del distrito
              required: false
              style: form
              explode: true
              example: "1"
              schema:
                type: string
            - name: seccionProvincialId
              in: query
              description: Id de sección provincial
              required: false
              style: form
              explode: true
              example: "0"
              schema:
                type: string
            - name: seccionId
              in: query
              description: Id de Sección, Departamento o Comuna.
              required: false
              style: form
              explode: true
              example: "3"
              schema:
                type: string
            - name: circuitoId
              in: query
              description: Id del Circuito
              required: false
              style: form
              explode: true
              example: "000039"
              schema:
                type: string
            - name: mesaId
              in: query
              description: Id de la Mesa
              required: false
              style: form
              explode: true
              example: "1244"
              schema:
                type: string
            responses:
              "200":
                description: successful operation
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/ValorElectoralTotalizado'
              "400":
                description: Invalid ID value
                content: {}
            security:
            - bearer_auth:
              - read
      components:
        schemas:
          ValorElectoralTotalizado:
            type: object
            properties:
              fechaTotalizacion:
                type: string
                format: date-time
              estadoRecuento:
                $ref: '#/components/schemas/EstadoRecuento'
              valoresTotalizadosPositivos:
                type: array
                items:
                  $ref: '#/components/schemas/ValoresAgrupacion'
              valoresTotalizadosOtros:
                type: array
                items:
                  $ref: '#/components/schemas/ValoresTotalizadosOtros'
          ValoresAgrupacion:
            type: object
            properties:
              idAgrupacion:
                type: string
                description: Id de la agrupación politica. Este Id es un código interno único generado en el Sistema de Recuento, que podría no coincidir con el código del telegrama.
              idAgrupacionTelegrama:
                type: string
                description: Id de la agrupacion politíca en el Telegrama. Este código puede no ser único para todo el pais.
              nombreAgrupacion:
                type: string
              urlLogo:
                type: string
              votos:
                type: integer
                format: int64
              votosPorcentaje:
                type: number
                format: double
            description: Valores obtenidos por la agrupación política.
          ValoresTotalizadosOtros:
            type: object
            properties:
              votosNulos:
                type: integer
                format: int64
              votosNulosPorcentaje:
                type: number
                format: double
              votosEnBlanco:
                type: integer
                format: int64
              votosEnBlancoPorcentaje:
                type: number
                format: double
              votosRecurridosComandoImpugnados:
                type: integer
                format: int64
              votosRecurridosComandoImpugnadosPorcentaje:
                type: number
                format: double
          EstadoRecuento:
            type: object
            properties:
              mesasEsperadas:
                type: integer
                format: int64
              mesasTotalizadas:
                type: integer
                format: int64
              mesasTotalizadasPorcentaje:
                type: number
                description: Porcentaje de totalización de mesas sobre el total del mesas esperadas.
                format: double
              cantidadElectores:
                type: integer
                description: Cantidad de electores sobre mesas totalizadas.
                format: int64
              cantidadVotantes:
                type: integer
                description: Cantidad de votantes sobre mesas totalizadas.
                format: int64
              participacionPorcentaje:
                type: number
                description: Porcentaje de participación sobre mesas totalizadas.
                format: double
        securitySchemes:
          bearer_auth:
            type: http
            scheme: bearer
            bearerFormat: JWT
    contentType: yaml
    _type: api_spec
